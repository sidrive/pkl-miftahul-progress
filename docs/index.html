<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Progress PKL — Miftahul Al Gazi Hermansyah</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-blue: #38bdf8;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  header h1 { font-size: 22px; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0; font-size: 14px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card .label { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .progress-bar-outer {
    background: #0b1220;
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent));
    transition: width 0.4s ease;
  }
  section { margin-bottom: 28px; }
  section > h2 {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .month-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .month-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
  }
  .month-header .title { font-weight: 600; font-size: 14px; }
  .month-header .pct { font-size: 13px; color: var(--muted); white-space: nowrap; margin-left: 12px; }
  .month-body { padding: 0 16px 14px; display: none; }
  .month-card.open .month-body { display: block; }
  .week-block { margin-top: 10px; }
  .week-block h4 { font-size: 12px; color: var(--muted); margin: 0 0 6px; font-weight: 600; }
  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    padding: 4px 0;
  }
  .task-row .box {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--card-border);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .task-row.done .box { background: var(--accent); border-color: var(--accent); }
  .task-row.done span.txt { color: var(--muted); text-decoration: line-through; }
  .task-row .id { color: var(--accent-blue); font-family: monospace; font-size: 11px; margin-right: 4px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
  .badge.blocked { background: rgba(239,68,68,0.15); color: var(--danger); }
  .timeline-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-left: 3px solid var(--accent-blue);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .timeline-item.blocked { border-left-color: var(--danger); }
  .timeline-item.done { border-left-color: var(--accent); }
  .timeline-item .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .timeline-item .field { font-size: 13px; margin-top: 4px; }
  .timeline-item .field b { color: var(--muted); font-weight: 600; }
  .empty-state { color: var(--muted); font-size: 13px; padding: 16px; text-align: center; }
  footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Progress PKL — Miftahul Al Gazi Hermansyah</h1>
    <p>Dashboard ini dibangun otomatis dari <code>TASKS.md</code> + <code>DAILY_LOG.md</code> setiap ada commit baru. Reload halaman untuk data terbaru.</p>
  </header>

  <section>
    <div class="stats-grid" id="stats-grid"></div>
  </section>

  <section>
    <h2>Checklist per Bulan</h2>
    <div id="months"></div>
  </section>

  <section>
    <h2>Log Harian Terbaru</h2>
    <div id="timeline"></div>
  </section>

  <footer id="footer"></footer>
</div>

<script>
async function loadJson(path) {
  const res = await fetch(path, { cache: "no-store" });
  if (!res.ok) throw new Error("Gagal memuat " + path);
  return res.json();
}

function pct(n) { return (n || 0) + "%"; }

function renderStats(progress) {
  const grid = document.getElementById("stats-grid");
  const items = [
    { label: "Progress Keseluruhan", value: pct(progress.overallPercent), bar: progress.overallPercent },
    { label: "Task Selesai", value: `${progress.doneTasks} / ${progress.totalTasks}` },
    { label: "Streak Lapor Harian", value: `${progress.currentStreakDays} hari` },
    { label: "Task Terhambat (blocked)", value: progress.blockedTasks.length, danger: progress.blockedTasks.length > 0 },
  ];
  grid.innerHTML = items.map(it => `
    <div class="stat-card">
      <div class="value" style="${it.danger ? 'color:var(--danger)' : ''}">${it.value}</div>
      <div class="label">${it.label}</div>
      ${it.bar !== undefined ? `<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${it.bar}%"></div></div>` : ""}
    </div>
  `).join("");
}

function renderMonths(tasksData, progress) {
  const container = document.getElementById("months");
  // Cocokkan berdasarkan urutan (index), bukan "number" — supaya section ad-hoc
  // (number: null) tidak saling bertabrakan.
  const perMonth = progress.perMonth || [];

  container.innerHTML = tasksData.map((month, idx) => {
    const stat = perMonth[idx] || { done: 0, total: 0, percent: 0 };
    const groupLabel = month.number != null ? `Bulan ${month.number} — ${month.title}` : month.title;
    const weeksHtml = month.weeks.map(week => {
      const weekLabel = week.number != null ? `Minggu ${week.number}` : (week.title || "");
      return `
      <div class="week-block">
        ${weekLabel ? `<h4>${weekLabel}</h4>` : ""}
        ${week.tasks.map(t => `
          <div class="task-row ${t.done ? 'done' : ''}">
            <div class="box"></div>
            <div>
              <span class="id">${t.id}</span>
              <span class="txt">${t.text}</span>
            </div>
          </div>
        `).join("")}
      </div>
    `;
    }).join("");

    return `
      <div class="month-card ${idx === 0 ? 'open' : ''}" data-idx="${idx}">
        <div class="month-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="title">${groupLabel}</div>
          <div class="pct">${stat.done}/${stat.total} (${stat.percent}%)</div>
        </div>
        <div class="month-body">${weeksHtml}</div>
      </div>
    `;
  }).join("");
}

function renderTimeline(logEntries) {
  const container = document.getElementById("timeline");
  if (!logEntries.length) {
    container.innerHTML = `<div class="empty-state">Belum ada log harian.</div>`;
    return;
  }
  const latest = logEntries.slice(0, 15);
  container.innerHTML = latest.map(e => `
    <div class="timeline-item ${e.status}">
      <div class="meta">
        <span>${e.date} · <span class="id">${e.task}</span></span>
        <span class="badge ${e.status === 'blocked' ? 'blocked' : ''}">${e.status}</span>
      </div>
      ${e.capaian ? `<div class="field"><b>Capaian:</b> ${e.capaian}</div>` : ""}
      ${e.kesulitan ? `<div class="field"><b>Kesulitan:</b> ${e.kesulitan}</div>` : ""}
    </div>
  `).join("");
}

async function init() {
  try {
    const [progress, tasks, log] = await Promise.all([
      loadJson("./data/progress.json"),
      loadJson("./data/tasks.json"),
      loadJson("./data/log.json"),
    ]);
    renderStats(progress);
    renderMonths(tasks, progress);
    renderTimeline(log);
    document.getElementById("footer").textContent =
      "Terakhir digenerate: " + new Date(progress.generatedAt).toLocaleString("id-ID");
  } catch (err) {
    document.querySelector(".container").innerHTML +=
      `<div class="empty-state">Gagal memuat data: ${err.message}. Pastikan docs/data/*.json sudah digenerate oleh workflow.</div>`;
  }
}

init();
</script>
</body>
</html>
