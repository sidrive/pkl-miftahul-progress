name: Update Progress Dashboard

on:
  push:
    branches: [main]
    paths:
      - "DAILY_LOG.md"
      - "TASKS.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate progress data
        run: node scripts/update_progress.js

      - name: Commit updated files
        run: |
          git config user.name "progress-bot"
          git config user.email "progress-bot@users.noreply.github.com"
          git add TASKS.md docs/data/
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
          else
            git commit -m "chore: update progress dashboard [skip ci]"
            git push
          fi
